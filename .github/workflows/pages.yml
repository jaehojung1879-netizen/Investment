name: Build insight data and deploy Pages

on:
  push:
    branches: [main]
  schedule:
    # Every day ~22:00 UTC (after US market close year-round) = 07:00 KST next
    # morning. Runs on weekends too, so the site is guaranteed fresh EVERY
    # morning — not just on trading days — carrying the latest US session.
    - cron: "0 22 * * *"
    # Weekdays ~07:10 UTC = 16:10 KST (after KR market close at 15:30 KST),
    # so KR prices/indices refresh the same day instead of lagging to the US run.
    - cron: "10 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: signal-history-and-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall pipeline

      - name: Run tests
        run: pytest -q

      - name: Fetch prior production state and paper summary
        run: |
          mkdir -p .state
          if git fetch origin signal-history; then
            if git show origin/signal-history:state/latest.json > .state/latest.json; then
              echo "PRIOR_STATE_PATH=$GITHUB_WORKSPACE/.state/latest.json" >> "$GITHUB_ENV"
            fi
            if git show origin/signal-history:ledger/summary.json > .state/summary.json; then
              echo "PAPER_SUMMARY_PATH=$GITHUB_WORKSPACE/.state/summary.json" >> "$GITHUB_ENV"
            fi
          fi

      - name: Build insight data
        env:
          # Add these secrets in repo Settings → Secrets and variables → Actions.
          # If absent, the pipeline still runs and the macro regime simply reports
          # low coverage/confidence (it never fabricates a neutral/bull reading).
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: python -m pipeline.build

      - name: Validate artifact
        run: python -m pipeline.validate data/site-data.json

      - name: Upload audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-audit
          path: data/audit.json
          retention-days: 90

      - name: Stage Pages site
        run: |
          rm -rf _site
          mkdir -p _site/data _site/docs
          cp index.html styles.css app.js _site/
          cp data/site-data.json _site/data/site-data.json
          cp docs/investment-philosophy.md _site/docs/investment-philosophy.md

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # This is deliberately after production validation AND deployment. A bad
      # build can never become the next rank-buffer/prior-regime state.
      - name: Publish last successful state
        run: |
          python scripts/update_state.py data/site-data.json .state/latest.next.json
          git config user.name "production-state-bot"
          git config user.email "actions@github.com"
          mkdir -p state-work
          if git ls-remote --exit-code --heads origin signal-history; then
            git fetch origin signal-history
            git worktree add state-work origin/signal-history
            git -C state-work checkout -B signal-history
          else
            git worktree add --detach state-work
            git -C state-work checkout --orphan signal-history
            git -C state-work rm -rf . || true
          fi
          mkdir -p state-work/state
          cp .state/latest.next.json state-work/state/latest.json
          git -C state-work add state/latest.json
          if git -C state-work diff --cached --quiet; then
            echo "production state unchanged"
          else
            git -C state-work commit -m "state: publish last successful production snapshot"
            git -C state-work push origin signal-history
          fi
