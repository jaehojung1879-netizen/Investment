<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Investment Insight</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="bar">
      <div class="bar-left">
        <strong id="portfolioName">Investment Insight</strong>
        <span id="dataStatus" class="muted">loading…</span>
      </div>
      <div class="bar-right muted">
        <span id="dataGenerated"></span>
        <span id="dataSource"></span>
      </div>
    </header>

    <nav class="tabs">
      <a href="#trade">트레이드</a>
      <a href="#core">보유</a>
      <a href="#macro">매크로</a>
      <a href="#risk">국면</a>
      <a href="#rules">원칙</a>
    </nav>

    <main>
      <section id="trade" class="sec">
        <div class="sec-head"><h2>오늘의 트레이드</h2><span id="tradeMeta" class="muted"></span></div>
        <div class="trade-cols">
          <div class="trade-col">
            <h3>국내 (KR)</h3>
            <div id="tradeKR" class="idea-list"></div>
          </div>
          <div class="trade-col">
            <h3>국외 (US)</h3>
            <div id="tradeUS" class="idea-list"></div>
          </div>
        </div>
        <details class="screen">
          <summary>전체 스크리닝 (확률순)</summary>
          <div id="screenTable" class="screen-table"></div>
        </details>
      </section>

      <section id="core" class="sec">
        <div class="sec-head"><h2>보유 종목</h2></div>
        <div id="coreCards" class="core-grid"></div>
      </section>

      <section id="macro" class="sec">
        <div class="sec-head"><h2>매크로</h2><span id="macroStance" class="muted"></span></div>
        <div id="macroPanel"></div>
      </section>

      <section id="risk" class="sec">
        <div class="sec-head"><h2>국면 · 리스크</h2></div>
        <div id="riskGrid" class="risk-grid"></div>
      </section>

      <section id="rules" class="sec">
        <div class="sec-head"><h2>원칙 · 체크리스트</h2></div>
        <article id="rulesDoc" class="md"></article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
